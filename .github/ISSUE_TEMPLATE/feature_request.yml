name: Feature Request
description: Suggest an idea for this project
type: Enhancement
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Please use this tracker only for **feature requests**.
        For questions and general discussion, use [GitHub Discussions](https://github.com/handcoding-labs/redis-stream-client-go/discussions).
        Before filing, please check [existing issues](https://github.com/handcoding-labs/redis-stream-client-go/issues) to avoid duplicates.

  - type: textarea
    id: problem
    attributes:
      label: Is your feature request related to a problem?
      description: A clear and concise description of what the problem is.
      placeholder: "e.g. There's no way to configure X, which means I have to..."
    validations:
      required: false

  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
      description: A clear and concise description of what you want to happen.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative solutions or workarounds you've already tried or thought about.
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any other context, examples, or references that support this request.
    validations:
      required: false
